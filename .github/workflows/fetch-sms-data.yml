name: Fetch SMS Pricing Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch: {}   # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install chromium --with-deps

      - name: Fetch real SMS pricing data
        env:
          VONAGE_API_KEY: ${{ secrets.VONAGE_API_KEY }}
          VONAGE_API_SECRET: ${{ secrets.VONAGE_API_SECRET }}
          MESSAGEBIRD_ACCESS_KEY: ${{ secrets.MESSAGEBIRD_ACCESS_KEY }}
          PLIVO_AUTH_ID: ${{ secrets.PLIVO_AUTH_ID }}
          PLIVO_AUTH_TOKEN: ${{ secrets.PLIVO_AUTH_TOKEN }}
          CLICKSEND_USERNAME: ${{ secrets.CLICKSEND_USERNAME }}
          CLICKSEND_API_KEY: ${{ secrets.CLICKSEND_API_KEY }}
        run: python scripts/fetch_real_data.py

      - name: Check data validity
        run: |
          python -c "
          import json
          with open('public/sms-data.json') as f:
              d = json.load(f)
          assert d['count'] > 500, f'Too few rates: {d[\"count\"]}'
          assert d['providerCount'] >= 3, f'Too few providers: {d[\"providerCount\"]}'
          assert d['countryCount'] >= 50, f'Too few countries: {d[\"countryCount\"]}'
          print(f'Valid: {d[\"count\"]} rates, {d[\"providerCount\"]} providers, {d[\"countryCount\"]} countries')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sms-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update SMS pricing data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
